services:
  - type: web
    name: aimi-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python backend/manage.py migrate --no-input && python backend/manage.py collectstatic --no-input && python backend/scripts/promote_to_admin.py
    startCommand: sh -c 'cd backend && exec gunicorn backend.wsgi:application --timeout 120 --workers 1'
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "aimi-backend-ai8x.onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://aimi-green.vercel.app"
      - key: DATABASE_URL
        value: "" # Will be set manually in Render dashboard
