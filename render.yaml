services:
  - type: web
    name: aimi-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python backend/manage.py migrate --no-input && python backend/manage.py collectstatic --no-input
    startCommand: sh -c 'cd backend && exec gunicorn backend.wsgi:application'
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*.render.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-vercel-frontend.vercel.app"
      - key: DATABASE_URL
        value: "" # Will be set manually in Render dashboard
